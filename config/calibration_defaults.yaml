# =============================================================================
# Eye Test Engine - Calibration Configuration
# =============================================================================
# All clinical thresholds and parameters from FSMv2 Calibration sheet.
# Modify these values via the Admin UI at /admin or directly in this file.
# Changes take effect on the next test session (not mid-session).
# =============================================================================

SYSTEM:
  system_version: 1
  active_profile: "Default"

# ---------------------------------------------------------------------------
# PATIENT → DERIVED VARIABLES
# Thresholds for computing derived variables from patient input
# ---------------------------------------------------------------------------
PATIENT_TO_DV:
  age_child_max: 17                    # Maximum age classified as Child
  age_presbyope_min: 40                # Minimum age classified as Presbyope
  driving_hours_high: 2                # Driving ≥ this → distance priority High
  screen_time_high: 6                  # Screen time ≥ this → near priority High
  near_work_hours_high: 4              # Near work ≥ this → near priority High
  last_eye_test_uncertain_months: 24   # Months after which stability → Uncertain
  add_possible_min_age: 38             # Minimum age for ADD = Possible
  add_likely_min_age: 42               # Minimum age for ADD = Likely
  allow_high_near_priority_to_force_near: true  # High near priority can trigger near workflow

# ---------------------------------------------------------------------------
# MISMATCH THRESHOLDS
# AR vs Lenso comparison thresholds (per eye)
# ---------------------------------------------------------------------------
MISMATCH_THRESHOLDS:
  re_sph_medium: 1.0       # Medium mismatch threshold for RE sphere (D)
  re_sph_large: 2.0        # Large mismatch threshold for RE sphere (D)
  re_cyl_medium: 0.5       # Medium mismatch threshold for RE cylinder (D)
  re_cyl_large: 1.0        # Large mismatch threshold for RE cylinder (D)
  re_axis_medium: 15       # Medium mismatch threshold for RE axis (deg)
  re_axis_large: 30        # Large mismatch threshold for RE axis (deg)
  le_sph_medium: 1.0       # Medium mismatch threshold for LE sphere (D)
  le_sph_large: 2.0        # Large mismatch threshold for LE sphere (D)
  le_cyl_medium: 0.5       # Medium mismatch threshold for LE cylinder (D)
  le_cyl_large: 1.0        # Large mismatch threshold for LE cylinder (D)
  le_axis_medium: 15       # Medium mismatch threshold for LE axis (deg)
  le_axis_large: 30        # Large mismatch threshold for LE axis (deg)

# ---------------------------------------------------------------------------
# START POLICY
# Determines which Rx source to use for starting values
# ---------------------------------------------------------------------------
START_POLICY:
  if_only_ar: "Start_AR"                          # Only AR data available
  if_only_lenso: "Start_Lenso"                    # Only Lenso data available
  if_satisfied_small_mismatch: "Start_Lenso"      # Patient satisfied, small mismatch
  if_unsatisfied_or_blur: "Start_AR"              # Patient unsatisfied or blur complaint
  if_large_mismatch_or_unstable: "Hybrid"         # Large mismatch or unstable
  hybrid_rounding_step: 0.25                       # Rounding step for Hybrid averaging (D)

# ---------------------------------------------------------------------------
# DISTANCE TARGET
# Target visual acuity for distance phases
# ---------------------------------------------------------------------------
DISTANCE_TARGET:
  default_distance_target: "6/6_target"            # Default target
  high_risk_distance_target: "6/9_acceptable"      # Target when risk/instability high
  distance_target_6_6_chart: "20_20_20"            # Chart for 6/6 endpoint
  distance_target_6_9_chart: "40_30_25"            # Chart for 6/9 endpoint

# ---------------------------------------------------------------------------
# ENDPOINT BIAS
# Final sphere adjustment based on patient profile
# ---------------------------------------------------------------------------
ENDPOINT_BIAS:
  comfort_presbyope_high_near_bias: "Undercorrect"  # Presbyope + comfort + near
  driver_night_issue_bias: "Overcorrect"             # Driver or night vision issues
  high_symptom_bias: "Neutral"                       # High symptom risk
  undercorrect_step: 0.25                            # Plus bias amount (D)
  overcorrect_step: 0.25                             # Minus bias amount (D)

# ---------------------------------------------------------------------------
# STEP POLICY
# Sphere and cylinder step sizes by policy
# ---------------------------------------------------------------------------
STEP_POLICY:
  conservative_sph_step: 0.25    # Sphere step - Conservative (D)
  standard_sph_step: 0.25        # Sphere step - Standard (D)
  aggressive_sph_step: 0.25      # Sphere step - Aggressive (D)
  conservative_cyl_step: 0.25    # Cylinder step - Conservative (D)
  standard_cyl_step: 0.25        # Cylinder step - Standard (D)
  aggressive_cyl_step: 0.25      # Cylinder step - Aggressive (D)

# ---------------------------------------------------------------------------
# AXIS POLICY
# JCC axis refinement parameters
# ---------------------------------------------------------------------------
AXIS_POLICY:
  axis_start_step: 5             # Initial JCC axis step (deg)
  axis_reversal_step_1: 3        # After first reversal (deg)
  axis_reversal_step_2: 1        # After second reversal (deg)
  axis_fine_allowed_policy: "Fine"  # Policy allowing 1-degree refinement
  axis_tol_strict: 1             # Axis tolerance - Strict guardrails (deg)
  axis_tol_normal: 3             # Axis tolerance - Normal guardrails (deg)
  axis_tol_relaxed: 5            # Axis tolerance - Relaxed guardrails (deg)

# ---------------------------------------------------------------------------
# CYLINDER POLICY
# JCC power refinement parameters
# ---------------------------------------------------------------------------
CYL_POLICY:
  cyl_tol_conservative: 0.25    # Cylinder tolerance - Conservative (D)
  cyl_tol_standard: 0.25        # Cylinder tolerance - Standard (D)
  cyl_tol_aggressive: 0.50      # Cylinder tolerance - Aggressive (D)
  jcc_power_same_low: 1         # SAME confirmations needed - Low confidence
  jcc_power_same_medium: 2      # SAME confirmations needed - Medium confidence
  jcc_power_same_high: 2        # SAME confirmations needed - High confidence

# ---------------------------------------------------------------------------
# FOGGING
# Fogging protocol parameters
# ---------------------------------------------------------------------------
FOGGING:
  no_fog_amount: 0.25                              # SPH shift when no fogging (D)
  standard_fog_amount: 0.75                        # Standard fog amount (D)
  strong_fog_amount: 1.0                           # Strong fog amount (D)
  strong_fog_if_presbyope: true                    # Presbyopes get strong fogging
  strong_fog_if_unstable: true                     # Unstable cases get strong fogging
  strong_fog_if_high_medical: true                 # High medical risk → strong fogging
  strong_fog_if_high_symptom: true                 # High symptom risk → strong fogging
  standard_fog_if_adult_stable_moderate_risk: true # Moderate-risk stable adults → standard
  stepdown_mode_strong_6_9: "Early_Stop_if_Risk"  # Strong fog + 6/9 target
  stepdown_mode_strong_6_6: "StepDown_0.25"        # Strong fog + 6/6 target
  stepdown_mode_standard: "StepDown_0.50_then_0.25"  # Standard fog clearance
  fog_confirm_low: 1                               # Confirmations - Low confidence
  fog_confirm_medium: 2                            # Confirmations - Medium confidence
  fog_confirm_high: 3                              # Confirmations - High confidence

# ---------------------------------------------------------------------------
# DUOCHROME
# Red-green balance parameters
# ---------------------------------------------------------------------------
DUOCHROME:
  duochrome_red_step: -0.25                # SPH adjustment when red clearer (D)
  duochrome_green_step: 0.25               # SPH adjustment when green clearer (D)
  duochrome_equal_confirmations: 2         # Consecutive EQUAL for convergence
  duochrome_max_flips_strict: 3            # Max flips - Strict guardrails
  duochrome_max_flips_normal: 4            # Max flips - Normal guardrails
  duochrome_max_flips_relaxed: 5           # Max flips - Relaxed guardrails

# ---------------------------------------------------------------------------
# BINOCULAR BALANCE
# Binocular sphere balance parameters
# ---------------------------------------------------------------------------
BINOC_BALANCE:
  bino_balance_step: 0.25                  # SPH adjustment per imbalance (D)
  bino_balance_same_required: 1            # SAME confirmations for convergence

# ---------------------------------------------------------------------------
# NEAR WORKFLOW
# Near ADD determination parameters
# ---------------------------------------------------------------------------
NEAR_WORKFLOW:
  trigger_near_if_dv_add_expected_possible: true   # Possible ADD triggers near workflow
  trigger_near_if_dv_add_expected_likely: true      # Likely ADD triggers near workflow
  near_add_step: 0.25                               # ADD increment per step (D)
  near_binoc_target_response: "TARGET_OK"           # Response indicating near endpoint

# ---------------------------------------------------------------------------
# ESCALATION
# Safety limits and anomaly detection thresholds
# ---------------------------------------------------------------------------
ESCALATION:
  max_delta_start_conservative: 1.25       # Max drift from start SPH - Conservative (D)
  max_delta_start_standard: 2.0            # Max drift from start SPH - Standard (D)
  max_delta_start_aggressive: 2.5          # Max drift from start SPH - Aggressive (D)
  max_delta_ar_standard: 3.0               # Max drift from AR SPH - Standard (D)
  max_delta_ar_high_medical: 2.0           # Max drift from AR SPH - High medical (D)
  immediate_review_if_high_symptom: false   # High symptom → immediate optom review
  immediate_review_if_high_medical: true    # High medical → immediate optom review
  anomaly_watch_if_hybrid: true             # Hybrid start → anomaly watch
  anomaly_watch_if_unstable: true           # Unstable → anomaly watch
  anomaly_watch_if_large_mismatch: true     # Large mismatch → anomaly watch

# ---------------------------------------------------------------------------
# PHASE TIMEOUTS
# Maximum allowed iterations per phase type, by convergence speed
# ---------------------------------------------------------------------------
PHASE_TIMEOUTS:
  timeout_coarse_fast: 24
  timeout_coarse_normal: 36
  timeout_coarse_slow: 48
  timeout_jcc_fast: 10
  timeout_jcc_normal: 14
  timeout_jcc_slow: 18
  timeout_duochrome_fast: 8
  timeout_duochrome_normal: 10
  timeout_duochrome_slow: 12
  timeout_bino_fast: 10
  timeout_bino_normal: 14
  timeout_bino_slow: 18
  timeout_near_fast: 16
  timeout_near_normal: 22
  timeout_near_slow: 28

# ---------------------------------------------------------------------------
# CHARTS
# Distance chart ladder (progressive difficulty)
# ---------------------------------------------------------------------------
CHARTS:
  dist_chart_1: "400"
  dist_chart_2: "200_150"
  dist_chart_3: "100_80"
  dist_chart_4: "70_60_50"
  dist_chart_5: "40_30_25"
  dist_chart_6: "20_20_20"
