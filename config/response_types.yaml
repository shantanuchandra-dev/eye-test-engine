# =============================================================================
# Response Types
# =============================================================================
# Standardized response enums for all phases.
# Maps legacy free-text intents to canonical response values.
# =============================================================================

response_types:
  READABILITY:
    values: [READABLE, NOT_READABLE, BLURRY]
    legacy_mapping:
      "Able to read": READABLE
      "able to read": READABLE
      "Unable to read": NOT_READABLE
      "unable to read": NOT_READABLE
      "Blurry": BLURRY
      "blurry": BLURRY
      "Getting better": READABLE
      "getting better": READABLE

  COMPARE_1_2:
    values: [BETTER_1, BETTER_2, SAME, CANT_TELL]
    legacy_mapping:
      "Flip 1 better": BETTER_1
      "Flip 1 Better": BETTER_1
      "flip 1 better": BETTER_1
      "Flip 1 MUCH better": BETTER_1
      "Flip 2 better": BETTER_2
      "Flip 2 Better": BETTER_2
      "flip 2 better": BETTER_2
      "Flip 2 MUCH better": BETTER_2
      "Both Same": SAME
      "both same": SAME
      "Both same": SAME
      "Can't tell": CANT_TELL
      "Repeat": CANT_TELL

  COLOR_CHOICE:
    values: [RED_CLEARER, GREEN_CLEARER, EQUAL, CANT_TELL]
    legacy_mapping:
      "Red": RED_CLEARER
      "red": RED_CLEARER
      "Red is clearer": RED_CLEARER
      "Green": GREEN_CLEARER
      "green": GREEN_CLEARER
      "Green is clearer": GREEN_CLEARER
      "Both Same": EQUAL
      "both same": EQUAL
      "Equal": EQUAL
      "Can't tell": CANT_TELL

  TOP_BOTTOM:
    values: [TOP_CLEARER, BOTTOM_CLEARER, SAME, CANT_TELL]
    legacy_mapping:
      "Top is blurry": BOTTOM_CLEARER
      "top is blurry": BOTTOM_CLEARER
      "Bottom is blurry": TOP_CLEARER
      "bottom is blurry": TOP_CLEARER
      "Top is clearer": TOP_CLEARER
      "Bottom is clearer": BOTTOM_CLEARER
      "Both Same": SAME
      "both same": SAME
      "Can't tell": CANT_TELL

  NEAR_READABILITY:
    values: [READABLE, NOT_READABLE, BLURRY, SAME, CANT_TELL]
    legacy_mapping:
      "Able to read": READABLE
      "Unable to read": NOT_READABLE
      "Blurry": BLURRY
      "Same": SAME
      "Can't tell": CANT_TELL
      "Comfortable": READABLE
      "Stay current": READABLE

  NEAR_BINOC:
    values: [TARGET_OK, NOT_CLEAR, SAME, CANT_TELL]
    legacy_mapping:
      "Comfortable": TARGET_OK
      "Clear": TARGET_OK
      "Not clear": NOT_CLEAR
      "Blurry": NOT_CLEAR
      "Same": SAME
      "Can't tell": CANT_TELL
